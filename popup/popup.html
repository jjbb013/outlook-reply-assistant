<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮件智能答复助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 128 128" fill="none">
          <rect width="128" height="128" fill="#00A3E0" rx="16"/>
          <path d="M20 35 L64 70 L108 35 L108 95 L20 95 Z" fill="white" fill-opacity="0.9"/>
          <path d="M20 35 L64 70 L108 35" fill="none" stroke="white" stroke-width="4"/>
          <circle cx="85" cy="75" r="12" fill="#00A3E0"/>
          <path d="M80 75 L84 79 L92 71" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>邮件智能答复助手</span>
      </div>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>正在读取邮件内容...</p>
    </div>

    <div id="noEmail" class="empty-state" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
        <path d="M22 6l-10 7L2 6"></path>
      </svg>
      <p>请先打开一封邮件</p>
      <span>在 Outlook 网页版中打开邮件后，点击插件图标</span>
    </div>

    <div id="error" class="error-state" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <p id="errorMessage">错误信息</p>
      <button onclick="location.reload()" class="btn btn-secondary">重试</button>
    </div>

    <div id="mainContent" class="main-content" style="display:none;">
      <!-- 邮件摘要 -->
      <section class="email-summary">
        <h3>邮件信息</h3>
        <div class="info-row">
          <label>主题：</label>
          <span id="emailSubject">-</span>
        </div>
        <div class="info-row">
          <label>发件人：</label>
          <span id="emailSender">-</span>
        </div>
        <div class="info-row">
          <label>语言：</label>
          <span id="emailLanguage" class="badge">-</span>
        </div>
      </section>

      <!-- 回复建议 -->
      <section class="reply-section">
        <div class="section-header">
          <h3>回复建议</h3>
          <span id="replySource" class="badge badge-source"></span>
        </div>
        <div class="reply-content" id="replyContent">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
          <p>AI 正在生成回复...</p>
        </div>
        <div class="reply-actions">
          <button id="fillBtn" class="btn btn-success">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
            </svg>
            填充到邮件
          </button>
          <button id="copyBtn" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            复制
          </button>
          <button id="saveBtn" class="btn btn-secondary" title="保存为模板">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
          </button>
          <button id="refreshBtn" class="btn btn-icon" title="重新生成">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
        </div>
      </section>

      <!-- 历史模板 -->
      <section class="templates-section">
        <h3>历史模板 <span id="templateCount">(0)</span></h3>
        <div id="templateList" class="template-list">
          <p class="empty-text">暂无保存的模板</p>
        </div>
      </section>
    </div>

    <footer>
      <button id="settingsBtn" class="btn btn-link">设置</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
